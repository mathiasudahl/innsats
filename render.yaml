services:
  - type: web
    name: innsats
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: INTERVALS_BASE_URL
        value: https://intervals.icu/api/v1
      - key: MATHIAS_ATHLETE_ID
        sync: false
      - key: MATHIAS_API_KEY
        sync: false
      - key: KAROLINE_ATHLETE_ID
        sync: false
      - key: KAROLINE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SITE_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
